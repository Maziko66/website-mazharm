<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" shape-rendering="crispEdges" width="140" height="140">
  <!-- Background -->
  <rect width="140" height="140" fill="#0a0e14"/>

  <!-- Water: dark blue -->
  <rect x="0" y="0" width="42" height="28" fill="#0d1a2e"/>
  <rect x="0" y="28" width="21" height="28" fill="#0d1a2e"/>
  <rect x="112" y="84" width="28" height="56" fill="#0d1a2e"/>
  <rect x="0" y="112" width="28" height="28" fill="#0d1a2e"/>

  <!-- Plains: tan/olive -->
  <rect x="42" y="0" width="70" height="42" fill="#2a2414"/>
  <rect x="21" y="28" width="49" height="42" fill="#2a2414"/>
  <rect x="28" y="70" width="56" height="42" fill="#2a2414"/>

  <!-- Forest: dark green -->
  <rect x="0" y="56" width="28" height="56" fill="#0e1e0e"/>
  <rect x="70" y="42" width="42" height="42" fill="#0e1e0e"/>
  <rect x="84" y="84" width="28" height="28" fill="#0e1e0e"/>

  <!-- Mountains: grey-brown -->
  <rect x="112" y="0" width="28" height="56" fill="#2a2018"/>
  <rect x="98" y="28" width="14" height="28" fill="#2a2018"/>

  <!-- Mountain peaks -->
  <rect x="119" y="7" width="14" height="7" fill="#3a2e20"/>
  <rect x="112" y="14" width="7" height="14" fill="#3a2e20"/>

  <!-- Forest detail -->
  <rect x="7" y="63" width="7" height="7" fill="#162816"/>
  <rect x="77" y="49" width="7" height="7" fill="#162816"/>
  <rect x="91" y="56" width="7" height="7" fill="#162816"/>

  <!-- Settlements (amber) -->
  <rect x="49" y="14" width="5" height="5" fill="#c08830"/>
  <rect x="35" y="49" width="5" height="5" fill="#c08830"/>
  <rect x="42" y="77" width="5" height="5" fill="#c08830"/>
  <rect x="63" y="91" width="5" height="5" fill="#c08830"/>

  <!-- Capital (brighter) -->
  <rect x="77" y="21" width="7" height="7" fill="#e07820"/>
  <rect x="79" y="23" width="3" height="3" fill="#f8d060"/>

  <!-- Grid overlay (every 14px, very faint) -->
  <line x1="14" y1="0" x2="14" y2="140" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="28" y1="0" x2="28" y2="140" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="42" y1="0" x2="42" y2="140" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="56" y1="0" x2="56" y2="140" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="70" y1="0" x2="70" y2="140" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="84" y1="0" x2="84" y2="140" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="98" y1="0" x2="98" y2="140" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="112" y1="0" x2="112" y2="140" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="126" y1="0" x2="126" y2="140" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="14" x2="140" y2="14" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="28" x2="140" y2="28" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="42" x2="140" y2="42" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="56" x2="140" y2="56" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="70" x2="140" y2="70" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="84" x2="140" y2="84" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="98" x2="140" y2="98" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="112" x2="140" y2="112" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="126" x2="140" y2="126" stroke="#c08830" stroke-width="0.5" opacity="0.1"/>

  <!-- Outer border -->
  <rect x="0" y="0" width="140" height="140" fill="none" stroke="#c08830" stroke-width="1" opacity="0.4"/>
</svg>
